<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>台中十大易肇事路口查詢</title>
</head>
<body>

    <h1>台中十大易肇事路口 作者:羅翊綸</h1>

    <a href="/">
        <button>回首頁</button>
    </a>

    <hr>

    {% if result %}
        {% for item in result %}
            <div>
                <h3>{{ item.road }}</h3>
                <p>事故件數：{{ item.count }}</p>
                <p>主要肇因：{{ item.reason }}</p>
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>目前沒有資料</p>
    {% endif %}

</body>
</html>
